name: CI

on:
  push:
    branches-ignore:
      - fileverse-mod  # Release workflow handles this branch
  pull_request:
    branches:
      - fileverse-mod

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "yarn"
          
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        
      - name: Type check
        run: yarn tsc
        
      - name: Lint
        run: yarn lint
        